<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="icon" type="image/png" href="cliffe-lab-favicon.png">
<link rel="apple-touch-icon" href="cliffe-lab-favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html{scroll-behavior:smooth;overflow-x:hidden}
  body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1b2233;background:#fff;line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:#232D4B;text-decoration:none}
  a:hover{color:#E57200}
  *{box-sizing:border-box}
  @keyframes clfsh{0%{background-position:100% 0}100%{background-position:-100% 0}}
  [data-reveal]{opacity:0}
</style>
</helmet>

<dc-import name="SiteHeader" active="news" hint-size="100%,74px"></dc-import>

<section style="position:relative;padding:76px 0 44px;overflow:hidden;background:radial-gradient(900px 420px at 82% -10%,rgba(43,179,179,.12),transparent 60%),radial-gradient(760px 380px at 8% 10%,rgba(229,114,0,.10),transparent 55%),linear-gradient(180deg,#fbfcfe,#f3f6fb)">
  <div style="max-width:1160px;margin:0 auto;padding:0 26px">
    <div style="font-size:.86rem;color:#5b6478;margin-bottom:18px"><a href="index.html" style="color:#5b6478" style-hover="color:#E57200">Home</a> · News</div>
    <p style="text-transform:uppercase;letter-spacing:.16em;font-size:.72rem;font-weight:700;color:#E57200;margin:0 0 14px">What's Happening</p>
    <h1 style="font-size:clamp(2.1rem,4vw,3rem);color:#232D4B;font-weight:800;line-height:1.15;letter-spacing:-.02em;margin:0">Lab News</h1>
    <p style="color:#5b6478;font-size:1.14rem;max-width:60ch;margin:18px 0 0">Awards, new papers, and life in the lab, in reverse chronological order.</p>
  </div>
</section>

<main style="padding:50px 0 90px">
  <div style="max-width:900px;margin:0 auto;padding:0 26px">

    <sc-if value="{{ loading }}" hint-placeholder-val="{{ true }}">
      <div style="display:grid;gap:22px">
        <sc-for list="{{ skeletons }}" as="s" hint-placeholder-count="4">
          <div style="border:1px solid #e2e7f0;border-radius:18px;overflow:hidden;background:#fff">
            <div style="width:100%;aspect-ratio:21/9;background:linear-gradient(90deg,#eef1f7 25%,#e3e8f1 37%,#eef1f7 63%);background-size:400% 100%;animation:clfsh 1.4s infinite"></div>
            <div style="padding:26px 28px">
              <div style="height:11px;width:26%;margin-bottom:14px;border-radius:6px;background:linear-gradient(90deg,#eef1f7 25%,#e3e8f1 37%,#eef1f7 63%);background-size:400% 100%;animation:clfsh 1.4s infinite"></div>
              <div style="height:20px;width:70%;margin-bottom:12px;border-radius:6px;background:linear-gradient(90deg,#eef1f7 25%,#e3e8f1 37%,#eef1f7 63%);background-size:400% 100%;animation:clfsh 1.4s infinite"></div>
              <div style="height:12px;width:100%;border-radius:6px;background:linear-gradient(90deg,#eef1f7 25%,#e3e8f1 37%,#eef1f7 63%);background-size:400% 100%;animation:clfsh 1.4s infinite"></div>
            </div>
          </div>
        </sc-for>
      </div>
    </sc-if>

    <sc-if value="{{ empty }}" hint-placeholder-val="{{ false }}">
      <div style="text-align:center;padding:60px 30px;color:#5b6478;background:#fbfcfe;border:1px dashed #e2e7f0;border-radius:18px">No news posted yet — check back soon.</div>
    </sc-if>

    <sc-if value="{{ hasItems }}" hint-placeholder-val="{{ false }}">
      <div data-reveal style="display:grid;gap:26px">
        <sc-for list="{{ items }}" as="n" hint-placeholder-count="4">
          <article style="border:1px solid #e2e7f0;border-radius:18px;overflow:hidden;background:#fff;box-shadow:0 10px 40px rgba(35,45,75,.08);transition:transform .3s,box-shadow .3s" style-hover="transform:translateY(-4px);box-shadow:0 20px 60px rgba(35,45,75,.14)">
            <div style="{{ n.imageWrapStyle }}"></div>
            <div style="padding:28px 30px">
              <div style="font-size:.78rem;font-weight:700;color:#E57200;text-transform:uppercase;letter-spacing:.08em">{{ n.dateLabel }}</div>
              <h2 style="font-size:1.4rem;color:#232D4B;margin:12px 0 12px;line-height:1.3">{{ n.title }}</h2>
              <p style="font-size:1rem;color:#4a5265;margin:0;white-space:pre-line">{{ n.message }}</p>
            </div>
          </article>
        </sc-for>
      </div>
    </sc-if>

  </div>
</main>

<dc-import name="SiteFooter" hint-size="100%,320px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state = { items: null, loading: true };

  componentDidMount(){
    this.setupReveals();
    import('./news-data.js').then(mod => mod.fetchNewsItems()).then(items => {
      this.setState({ items, loading: false });
    }).catch(err => { console.error('News feed error:', err); this.setState({ items: [], loading: false }); });
  }
  componentDidUpdate(){ if (this._observeReveals) this._observeReveals(); }
  componentWillUnmount(){ if (this._revIO) this._revIO.disconnect(); }
  setupReveals(){
    this._reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    this._revIO = new IntersectionObserver((ents) => {
      ents.forEach(e => {
        if (!e.isIntersecting) return;
        const el = e.target; this._revIO.unobserve(el);
        el.animate([{ opacity: 0, transform: 'translateY(24px)' }, { opacity: 1, transform: 'none' }], { duration: this._reduce ? 0 : 650, easing: 'cubic-bezier(.16,.84,.44,1)', fill: 'forwards' });
      });
    }, { threshold: .1, rootMargin: '0px 0px -6% 0px' });
    this._observeReveals = () => { document.querySelectorAll('[data-reveal]').forEach(el => { if (!el.__rev) { el.__rev = 1; this._revIO.observe(el); } }); };
    this._observeReveals();
  }

  // Turns a plain message string into rich nodes: *text* -> italic, and any
  // http(s) URL -> a clickable link. Returns an array React renders as-is.
  richNodes(str){
    if (!str) return '';
    let k = 0;
    return String(str).split(/(\*[^*]+\*|https?:\/\/[^\s]+)/g).map(tok => {
      if (!tok) return null;
      if (/^\*[^*]+\*$/.test(tok)) return React.createElement('i', { key: k++ }, tok.slice(1, -1));
      if (/^https?:\/\//.test(tok)) {
        const href = tok.replace(/[).,]+$/, '');
        return React.createElement('a', { key: k++, href, target: '_blank', rel: 'noopener', style: { color: '#232D4B', fontWeight: 700, wordBreak: 'break-word' } }, href.replace(/^https?:\/\//, ''));
      }
      return tok;
    }).filter(x => x !== null);
  }

  renderVals(){
    return {
      loading: this.state.loading,
      hasItems: !this.state.loading && !!(this.state.items && this.state.items.length),
      empty: !this.state.loading && !(this.state.items && this.state.items.length),
      items: (this.state.items || []).map(n => ({
        ...n,
        message: this.richNodes(n.message),
        imageWrapStyle: n.image
          ? ('width:100%;aspect-ratio:21/9;overflow:hidden;background:#232D4B center/cover no-repeat url("' + n.image + '")')
          : 'display:none'
      })),
      skeletons: [1, 2, 3, 4]
    };
  }
}

</script>
</body>
</html>

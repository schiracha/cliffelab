<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="icon" type="image/png" href="cliffe-lab-favicon.png">
<link rel="apple-touch-icon" href="cliffe-lab-favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html{scroll-behavior:smooth;overflow-x:hidden}
  body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1b2233;background:#fff;line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:#232D4B;text-decoration:none}
  a:hover{color:#E57200}
  *{box-sizing:border-box}
  @keyframes clfsh{0%{background-position:100% 0}100%{background-position:-100% 0}}
  [data-reveal]{opacity:0}
</style>
</helmet>

<dc-import name="SiteHeader" active="photos" hint-size="100%,74px"></dc-import>

<section style="position:relative;padding:76px 0 44px;overflow:hidden;background:radial-gradient(900px 420px at 82% -10%,rgba(43,179,179,.12),transparent 60%),radial-gradient(760px 380px at 8% 10%,rgba(229,114,0,.10),transparent 55%),linear-gradient(180deg,#fbfcfe,#f3f6fb)">
  <div style="max-width:1160px;margin:0 auto;padding:0 26px">
    <div style="font-size:.86rem;color:#5b6478;margin-bottom:18px"><a href="index.html" style="color:#5b6478" style-hover="color:#E57200">Home</a> · Photos</div>
    <p style="text-transform:uppercase;letter-spacing:.16em;font-size:.72rem;font-weight:700;color:#E57200;margin:0 0 14px">Who we are</p>
    <h1 style="font-size:clamp(2.1rem,4vw,3rem);color:#232D4B;font-weight:800;line-height:1.15;letter-spacing:-.02em;margin:0">Lab Photos</h1>
    <p style="color:#5b6478;font-size:1.14rem;max-width:60ch;margin:18px 0 0">More than science, a community</p>
  </div>
</section>

<main style="padding:50px 0 90px">
  <div style="max-width:1160px;margin:0 auto;padding:0 26px">

    <sc-if value="{{ loading }}" hint-placeholder-val="{{ true }}">
      <div style="column-width:300px;column-gap:18px">
        <sc-for list="{{ skeletons }}" as="s" hint-placeholder-count="6">
          <div style="{{ s.cardStyle }}">
            <div style="width:100%;aspect-ratio:{{ s.ratio }};background:linear-gradient(90deg,#eef1f7 25%,#e3e8f1 37%,#eef1f7 63%);background-size:400% 100%;animation:clfsh 1.4s infinite"></div>
          </div>
        </sc-for>
      </div>
    </sc-if>

    <sc-if value="{{ empty }}" hint-placeholder-val="{{ false }}">
      <div style="text-align:center;padding:60px 30px;color:#5b6478;background:#fbfcfe;border:1px dashed #e2e7f0;border-radius:18px">No Photos posted yet — check back soon.</div>
    </sc-if>

    <sc-if value="{{ hasItems }}" hint-placeholder-val="{{ false }}">
      <div data-reveal style="column-width:300px;column-gap:18px">
        <sc-for list="{{ items }}" as="n" hint-placeholder-count="6">
          <article style="break-inside:avoid;margin:0 0 18px;border:1px solid #e2e7f0;border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 8px 30px rgba(35,45,75,.08);transition:transform .3s,box-shadow .3s" style-hover="transform:translateY(-4px);box-shadow:0 16px 44px rgba(35,45,75,.14)">
            <sc-if value="{{ n.image }}" hint-placeholder-val="{{ true }}">
              <img loading="lazy" src="{{ n.image }}" alt="{{ n.title }}" style="width:100%;height:auto;display:block">
            </sc-if>
            <sc-if value="{{ n.hasCaption }}" hint-placeholder-val="{{ true }}">
              <div style="padding:12px 14px">
                <sc-if value="{{ n.dateLabel }}" hint-placeholder-val="{{ true }}"><div style="font-size:.62rem;font-weight:700;color:#E57200;text-transform:uppercase;letter-spacing:.08em">{{ n.dateLabel }}</div></sc-if>
                <sc-if value="{{ n.title }}" hint-placeholder-val="{{ true }}"><h2 style="font-size:.9rem;color:#232D4B;margin:5px 0 4px;line-height:1.3">{{ n.title }}</h2></sc-if>
                <sc-if value="{{ n.message }}" hint-placeholder-val="{{ true }}"><p style="font-size:.76rem;color:#4a5265;margin:0;white-space:pre-line;line-height:1.5">{{ n.message }}</p></sc-if>
              </div>
            </sc-if>
          </article>
        </sc-for>
      </div>
    </sc-if>

  </div>
</main>

<dc-import name="SiteFooter" hint-size="100%,320px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state = { items: null, loading: true };

  componentDidMount(){
    this.setupReveals();
    import('./photos-data.js').then(mod => mod.fetchPhotoItems()).then(items => {
      this.setState({ items, loading: false });
    }).catch(err => { console.error('Photo feed error:', err); this.setState({ items: [], loading: false }); });
  }
  componentDidUpdate(){ if (this._observeReveals) this._observeReveals(); }
  componentWillUnmount(){ if (this._revIO) this._revIO.disconnect(); }
  setupReveals(){
    this._reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    this._revIO = new IntersectionObserver((ents) => {
      ents.forEach(e => {
        if (!e.isIntersecting) return;
        const el = e.target; this._revIO.unobserve(el);
        el.animate([{ opacity: 0, transform: 'translateY(24px)' }, { opacity: 1, transform: 'none' }], { duration: this._reduce ? 0 : 650, easing: 'cubic-bezier(.16,.84,.44,1)', fill: 'forwards' });
      });
    }, { threshold: .1, rootMargin: '0px 0px -6% 0px' });
    this._observeReveals = () => { document.querySelectorAll('[data-reveal]').forEach(el => { if (!el.__rev) { el.__rev = 1; this._revIO.observe(el); } }); };
    this._observeReveals();
  }

  renderVals(){
    return {
      loading: this.state.loading,
      hasItems: !this.state.loading && !!(this.state.items && this.state.items.length),
      empty: !this.state.loading && !(this.state.items && this.state.items.length),
      items: (this.state.items || []).map(n => ({
        ...n,
        hasCaption: !!(n.title || n.message || n.dateLabel)
      })),
      skeletons: ['3/4','1/1','4/3','3/4','4/5','1/1'].map((r, i) => ({
        id: i,
        ratio: r,
        cardStyle: 'break-inside:avoid;margin:0 0 18px;border:1px solid #e2e7f0;border-radius:16px;overflow:hidden;background:#fff'
      }))
    };
  }
}

</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</helmet>
<header style="{{ headerStyle }}">
  <div style="max-width:1160px;margin:0 auto;padding:0 26px;display:flex;align-items:center;justify-content:space-between;height:74px;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
    <a href="index.html" aria-label="Cliffe Lab home" style="display:flex;align-items:center;gap:13px;text-decoration:none">
      <img src="cliffe-lab-logo.png" alt="Cliffe Lab" style="height:58px;width:auto;display:block">
    </a>

    <sc-if value="{{ showInlineNav }}" hint-placeholder-val="{{ true }}">
      <nav style="display:flex;gap:30px;align-items:center;font-weight:600;font-size:.94rem">
        <sc-for list="{{ links }}" as="link" hint-placeholder-count="5">
          <a href="{{ link.href }}" style="color:{{ link.color }};text-decoration:none;transition:color .2s" style-hover="color:#232D4B">{{ link.label }}</a>
        </sc-for>
        <a href="index.html#join" style="background:#232D4B;color:#fff;padding:10px 20px;border-radius:100px;text-decoration:none;transition:transform .2s,background .2s" style-hover="background:#E57200;color:#fff;transform:translateY(-1px)">Join the Lab</a>
      </nav>
    </sc-if>

    <sc-if value="{{ narrow }}" hint-placeholder-val="{{ false }}">
      <button aria-label="Menu" onClick="{{ toggleMenu }}" style="background:none;border:0;cursor:pointer;padding:8px;display:flex;flex-direction:column;gap:5px">
        <span style="display:block;width:24px;height:2px;background:#232D4B"></span>
        <span style="display:block;width:24px;height:2px;background:#232D4B"></span>
        <span style="display:block;width:24px;height:2px;background:#232D4B"></span>
      </button>
    </sc-if>
  </div>

  <sc-if value="{{ mobileOpen }}" hint-placeholder-val="{{ false }}">
    <nav style="display:flex;flex-direction:column;gap:18px;background:#fff;padding:22px 26px;border-bottom:1px solid #e2e7f0;box-shadow:0 10px 40px rgba(35,45,75,.10);font-family:'Inter',sans-serif;font-weight:600">
      <sc-for list="{{ links }}" as="link" hint-placeholder-count="5">
        <a href="{{ link.href }}" onClick="{{ closeMenu }}" style="color:{{ link.color }};text-decoration:none">{{ link.label }}</a>
      </sc-for>
      <a href="index.html#join" onClick="{{ closeMenu }}" style="color:#232D4B;text-decoration:none;font-weight:700">Join the Lab →</a>
    </nav>
  </sc-if>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:74},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;&quot;,&quot;options&quot;:[&quot;&quot;,&quot;research&quot;,&quot;publications&quot;,&quot;news&quot;,&quot;team&quot;,&quot;contact&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { scrolled: false, narrow: false, menuOpen: false };
  componentDidMount(){
    this._s = () => this.setState({ scrolled: window.scrollY > 8 });
    this._r = () => this.setState({ narrow: window.innerWidth <= 880 });
    window.addEventListener('scroll', this._s, { passive: true });
    window.addEventListener('resize', this._r, { passive: true });
    this._s(); this._r();
  }
  componentWillUnmount(){
    window.removeEventListener('scroll', this._s);
    window.removeEventListener('resize', this._r);
  }
  renderVals(){
    const active = this.props.active || '';
    const links = [
      { label: 'Research', href: 'index.html#focus', key: 'research' },
      { label: 'Publications', href: 'Publications.dc.html', key: 'publications' },
      { label: 'News', href: 'index.html#news', key: 'news' },
      { label: 'Team', href: 'Team.dc.html', key: 'team' },
      { label: 'Contact', href: 'Contact.dc.html', key: 'contact' },
    ].map(l => ({ ...l, color: l.key === active ? '#E57200' : '#5b6478' }));
    const headerStyle = {
      position: 'sticky', top: 0, zIndex: 50,
      background: 'rgba(255,255,255,.86)',
      backdropFilter: 'saturate(140%) blur(14px)',
      WebkitBackdropFilter: 'saturate(140%) blur(14px)',
      borderBottom: '1px solid ' + (this.state.scrolled ? '#e2e7f0' : 'transparent'),
      boxShadow: this.state.scrolled ? '0 4px 24px rgba(35,45,75,.06)' : 'none',
      transition: 'border-color .3s, box-shadow .3s'
    };
    return {
      links, headerStyle,
      narrow: this.state.narrow,
      showInlineNav: !this.state.narrow,
      mobileOpen: this.state.narrow && this.state.menuOpen,
      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
      closeMenu: () => this.setState({ menuOpen: false })
    };
  }
}
</script>
</body>
</html>
